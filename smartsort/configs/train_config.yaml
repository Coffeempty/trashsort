# SmartSort Training Configuration
# Hardware: NVIDIA RTX 3050 Ti Laptop (4 GB VRAM)
# Model: YOLO11 medium  |  Task: detection (no segmentation)
# Classes: 0=Recyclable, 1=Organic, 2=General Waste  (nc=3)

# ── Model & task ────────────────────────────────────────────────────────────────
model: yolo11m.pt          # YOLO11 medium — best accuracy your GPU can handle
task: detect               # detection only, NOT segmentation

# ── Dataset ─────────────────────────────────────────────────────────────────────
# Relative to trashsort/ root — train.py resolves this to an absolute path.
data: merged_dataset/dataset.yaml

# ── Core training ────────────────────────────────────────────────────────────────
epochs: 150
imgsz: 640
batch: 8                   # Max safe for 4 GB VRAM with yolo11m
patience: 30               # early-stopping patience (epochs without improvement)

# ── Optimizer ────────────────────────────────────────────────────────────────────
lr0: 0.01                  # initial learning rate
lrf: 0.01                  # final lr = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 5
warmup_momentum: 0.8

# ── Augmentation ─────────────────────────────────────────────────────────────────
augment: true
mosaic: 1.0
mixup: 0.15
copy_paste: 0.1
degrees: 15.0
translate: 0.2
scale: 0.5
fliplr: 0.5
flipud: 0.0                # garbage is gravity-aware — skip vertical flip
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
erasing: 0.3

# ── Class weighting ──────────────────────────────────────────────────────────────
# YOLO11 does not support per-class loss weighting (cls_pw is not a valid arg).
# Raise cls (classification loss gain, default=0.5) to make the model penalise
# mis-classifications more strongly — helps with General Waste being underrepresented.
cls: 1.5

# ── System ───────────────────────────────────────────────────────────────────────
workers: 4
device: 0                  # GPU index (0 = first GPU)
# Relative to trashsort/ root — train.py resolves this to an absolute path.
project: smartsort/runs
name: train
exist_ok: true

# ── W&B logging ──────────────────────────────────────────────────────────────────
# train.py will gracefully skip W&B if wandb is not logged in / not installed.
wandb_project: smartsort
wandb_enabled: true
